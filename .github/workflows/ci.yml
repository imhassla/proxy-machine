name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true
      - name: Format check
        run: test -z "$(gofmt -l .)" || (gofmt -l . && exit 1)
      - name: Vet
        run: go vet ./...
      - name: Build
        run: go build ./...
      - name: Test (race)
        run: go test -race ./...

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t proxymachine:ci .
