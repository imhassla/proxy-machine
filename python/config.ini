[database]
path = data.db

[defaults]
checker_workers = 25
checker_timeout = 4
api_workers = 200

[commands]
proxy_http = python3 proxy.py -type http -db -api -w ${CHECKER_WORKERS} -t ${CHECKER_TIMEOUT}
proxy_https = python3 proxy.py -type https -db -api -w ${CHECKER_WORKERS} -t ${CHECKER_TIMEOUT}
proxy_socks4 = python3 proxy.py -type socks4 -db -api -w ${CHECKER_WORKERS} -t ${CHECKER_TIMEOUT}
proxy_socks5 = python3 proxy.py -type socks5 -db -api -w ${CHECKER_WORKERS} -t ${CHECKER_TIMEOUT}
checker = python3 checker.py -list -w ${CHECKER_WORKERS} -t ${CHECKER_TIMEOUT}
relay = python3 http-proxy-relay.py
api = uvicorn api:app --workers ${API_WORKERS} --host 0.0.0.0 --port 8000 --reload

